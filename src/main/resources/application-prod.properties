spring.application.name=quantity-measurement-app

# DB CONFIG (RDS)
spring.datasource.url=jdbc:mysql://quantitydb.cdsye0kq0jvr.ap-southeast-2.rds.amazonaws.com:3306/quantitydb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.sql.init.mode=never

# OAuth (ENV VARIABLES)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

spring.security.oauth2.client.registration.google.redirect-uri=http://<EC2-PUBLIC-IP>:8080/login/oauth2/code/{registrationId}